<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2a4a"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <radialGradient id="glow" cx="0.2" cy="0" r="0.8">
      <stop offset="0" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g font-family="'Inter', ui-sans-serif, system-ui, sans-serif" fill="#dbe4f2">
    <text x="80" y="110" font-size="18" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.55)">AITORBERROCAL.STUDIO</text>
    <text x="80" y="136" font-size="14" letter-spacing="3" fill="rgba(255,255,255,0.4)">PORTFOLIO · BILBAO · 2026</text>
  </g>

  <g font-family="'Fraunces', ui-serif, Georgia, serif" fill="#ffffff">
    <text x="80" y="310" font-size="92" font-weight="600" letter-spacing="-2">Aitor Berrocal</text>
    <text x="80" y="400" font-size="46" font-weight="500" font-style="italic" fill="rgba(255,255,255,0.75)">Investigación social + IA</text>
  </g>

  <g font-family="'Inter', ui-sans-serif, system-ui, sans-serif" fill="rgba(255,255,255,0.6)">
    <text x="80" y="480" font-size="22" font-weight="400">Sociólogo · Investigador social · Desarrollador de productos digitales</text>
  </g>

  <g transform="translate(80 540)">
    <rect width="560" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="28" y="31" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="500" fill="rgba(255,255,255,0.7)">aitorberrocal14.github.io/Portfolio_aitor</text>
  </g>

  <g transform="translate(1050 540)" font-family="'Inter', ui-sans-serif, system-ui, sans-serif">
    <circle r="60" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text text-anchor="middle" y="16" font-size="46" font-weight="700" fill="#ffffff" font-family="'Fraunces', ui-serif, serif">AB</text>
  </g>

  <g transform="translate(900 120)">
    <circle r="100" fill="rgba(255,255,255,0.04)"/>
  </g>
</svg>
