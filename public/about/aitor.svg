<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Foto de Aitor Berrocal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#0f2a4a"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#dots)"/>
  <g transform="translate(200 260)" text-anchor="middle" fill="#f1f3f7" font-family="'Fraunces', Georgia, serif">
    <text y="0" font-size="120" font-weight="600" letter-spacing="-4">AB</text>
    <text y="60" font-size="14" letter-spacing="4" font-weight="500" fill="#dbe4f2">FOTO PENDIENTE</text>
  </g>
</svg>
